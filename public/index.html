<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>端口健康监测</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='10' fill='%2310b981'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css?v=__V__" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>端口健康监测</h1>
      <button class="btn primary add-btn" id="addBtn"><span class="plus">+</span> 注册服务</button>
      <button class="btn ghost add-btn" id="portsBtn"><span class="scan-ic">🔎</span> 端口速查</button>
    </div>
    <div class="range-switch" id="rangeSwitch" role="tablist" aria-label="时间范围">
      <!-- range buttons injected here -->
    </div>
  </header>

  <main class="container">
    <section id="serviceList" class="service-list"></section>
    <p class="empty" id="emptyHint" hidden>还没有注册任何服务，点击左上角「注册服务」开始监测。</p>
  </main>

  <footer class="foot">
    <span id="footMeta">每 10 秒记录一次</span>
  </footer>

  <template id="cardTpl">
    <article class="card">
      <div class="card-head">
        <div class="card-title">
          <span class="dot"></span>
          <a class="name-link" title="打开公网网址">
            <span class="name"></span>
            <span class="jump-icon" hidden>↗</span>
          </a>
          <span class="port-badge"></span>
        </div>
        <div class="card-actions">
          <span class="uptime-pct" title="所选时间范围内的在线率"></span>
          <button class="icon-btn edit" title="编辑服务">✎</button>
          <button class="icon-btn del" title="删除服务">✕</button>
        </div>
      </div>
      <div class="bar" aria-hidden="true"><div class="bar-inner"></div></div>
      <div class="card-meta">
        <button class="root" title="点击复制路径" hidden>
          <span class="root-ic">📁</span>
          <span class="root-path"></span>
        </button>
        <a class="url" target="_blank" rel="noopener" hidden></a>
        <span class="since" title="从当前状态开始持续的时长"></span>
      </div>
    </article>
  </template>

  <div class="tooltip" id="tooltip" hidden></div>
  <div class="toast" id="toast"></div>

  <div class="modal-backdrop" id="portsModal" hidden>
    <div class="modal ports-modal" role="dialog" aria-modal="true" aria-labelledby="portsTitle">
      <div class="modal-head">
        <h2 id="portsTitle">端口速查</h2>
        <div class="ports-head-actions">
          <button class="btn ghost small" id="portsRefresh" title="重新扫描">刷新</button>
          <button class="icon-btn" id="portsClose" title="关闭">✕</button>
        </div>
      </div>
      <div class="ports-body">
        <p class="ports-note" id="portsNote">当前正在监听的 TCP 端口 · 点击表头可排序</p>
        <div class="ports-table-wrap">
          <table class="ports-table">
            <thead>
              <tr>
                <th data-key="port" class="col-port sortable">端口</th>
                <th data-key="addr" class="col-addr sortable">监听地址</th>
                <th data-key="name" class="col-name sortable">服务 / 命令</th>
                <th data-key="registered" class="col-reg sortable">注册情况</th>
              </tr>
            </thead>
            <tbody id="portsTbody"></tbody>
          </table>
        </div>
        <p class="ports-empty" id="portsEmpty" hidden>未读取到正在监听的端口。</p>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="formModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">注册服务</h2>
        <button class="icon-btn" id="modalClose" title="关闭">✕</button>
      </div>
      <form class="modal-form" id="svcForm">
        <div class="field">
          <label for="f-name">服务名称</label>
          <input id="f-name" name="name" type="text" placeholder="例如 API 网关" required />
        </div>
        <div class="field">
          <label for="f-port">端口号</label>
          <input id="f-port" name="port" type="number" min="1" max="65535" placeholder="8080" required />
        </div>
        <div class="field">
          <label for="f-root">服务根目录</label>
          <input id="f-root" name="rootDir" type="text" placeholder="/opt/app" />
        </div>
        <div class="field">
          <label for="f-url">公网网址</label>
          <input id="f-url" name="publicUrl" type="text" placeholder="https://example.com" />
        </div>
        <div class="form-actions">
          <span class="form-error" id="formError"></span>
          <button type="button" class="btn ghost" id="modalCancel">取消</button>
          <button type="submit" class="btn primary" id="modalSubmit">注册</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="ignoreModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="ignoreTitle">
      <div class="modal-head">
        <h2 id="ignoreTitle">忽略端口</h2>
        <button class="icon-btn" id="ignoreClose" title="关闭">✕</button>
      </div>
      <form class="modal-form" id="ignoreForm">
        <p class="ignore-hint" id="ignoreHint">将端口从「未注册」提醒中隐藏。备注可留空。</p>
        <div class="field">
          <label for="f-ignore-note">备注（可选）</label>
          <input id="f-ignore-note" name="note" type="text" placeholder="例如 系统进程、临时调试…" />
        </div>
        <div class="form-actions">
          <span class="form-error" id="ignoreError"></span>
          <button type="button" class="btn ghost" id="ignoreCancel">取消</button>
          <button type="submit" class="btn primary" id="ignoreSubmit">忽略</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js?v=__V__"></script>
</body>
</html>
